<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Calculator with Easter Egg</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #4facfe, #00f2fe);
            color: #fff;
        }

        .calculator {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            text-align: center;
            width: 350px;
            transition: transform 0.3s ease-in-out;
        }

        .calculator:hover {
            transform: scale(1.05);
        }

        .display {
            width: 100%;
            height: 60px;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 18px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            transform: scale(1.1);
        }

        button:active {
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        button.special {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        button.special:hover {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" readonly />
        <div class="buttons">
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="clearDisplay()" class="special">C</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculateResult()">=</button>
            <button onclick="appendValue('*')">*</button>

            <button onclick="appendValue('/')">/</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let easterEggTriggered = false;

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
            easterEggTriggered = false;
        }

        function calculateResult() {
            try {
                if (display.value === '80085' && !easterEggTriggered) {
                    easterEggTriggered = true;
                    window.location.href = 'https://xhamster.com';
                } else if(display.value === '6969' && !easterEggTriggered){
                    easterEggTriggered = true;
                    window.location.href = 'https://pornhub.com';
                }{
                    const result = eval(display.value);
                    display.value = result;
                }
            } catch {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
