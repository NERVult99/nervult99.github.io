<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
    }

    .game-container {
      max-width: 400px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 15px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
      position: relative;
    }

    .cell {
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .cell:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.4);
    }

    .cell.taken {
      pointer-events: none;
      color: #ddd;
      text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
    }

    .winner {
      font-size: 1.8rem;
      margin-bottom: 15px;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
    }

    .reset {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .reset:hover {
      background: linear-gradient(135deg, #38f9d7, #43e97b);
      transform: scale(1.05);
    }

    .reset:active {
      transform: scale(0.95);
    }

    .line {
      position: absolute;
      height: 5px;
      background: #ff6b6b;
      border-radius: 5px;
      transform-origin: left;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="winner" id="winner"></div>
    <div class="board" id="board"></div>
    <button class="reset" id="reset">Restart Game</button>
  </div>

  <script>
    const board = document.getElementById('board');
    const winnerText = document.getElementById('winner');
    const resetButton = document.getElementById('reset');
    let currentPlayer = 'X';
    let gameActive = true;
    const cells = [];

    const winningCombinations = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    function createBoard() {
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.dataset.index = i;
        cell.addEventListener('click', handleCellClick);
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    function drawWinningLine(indices) {
      const [start, middle, end] = indices;
      const rectStart = cells[start].getBoundingClientRect();
      const rectEnd = cells[end].getBoundingClientRect();

      const line = document.createElement('div');
      line.classList.add('line');
      board.appendChild(line);

      const x1 = rectStart.left + rectStart.width / 2;
      const y1 = rectStart.top + rectStart.height / 2;
      const x2 = rectEnd.left + rectEnd.width / 2;
      const y2 = rectEnd.top + rectEnd.height / 2;

      const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
      const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

      line.style.width = `${length}px`;
      line.style.transform = `translate(${x1 - rectStart.left}px, ${y1 - rectStart.top}px) rotate(${angle}deg)`;
    }

    function handleCellClick(e) {
      if (!gameActive || e.target.textContent !== '') return;

      e.target.textContent = currentPlayer;
      e.target.classList.add('taken');

      const winner = checkWinner();
      if (winner) {
        winnerText.textContent = `${currentPlayer} Wins!`;
        gameActive = false;
        drawWinningLine(winner);
        return;
      }

      if (cells.every(cell => cell.textContent !== '')) {
        winnerText.textContent = "It's a Draw!";
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    }

    function checkWinner() {
      return winningCombinations.find(combination => {
        if (combination.every(index => cells[index].textContent === currentPlayer)) {
          return combination;
        }
      });
    }

    function resetGame() {
      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('taken');
      });
      currentPlayer = 'X';
      gameActive = true;
      winnerText.textContent = '';
      document.querySelectorAll('.line').forEach(line => line.remove());
    }

    resetButton.addEventListener('click', resetGame);
    createBoard();
  </script>
</body>
</html>
